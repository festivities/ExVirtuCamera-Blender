schema_version = "1.0.0"

id = "exvirtucamera_blender"
version = "1.3.1"
name = "ExVirtuCamera"
tagline = "Stream your Blender viewport to the VirtuCamera mobile app"
maintainer = "festivity"
type = "add-on"

website = "https://github.com/festivities/ExVirtuCamera-Blender"

blender_version_min = "4.4.0"

tags = ["Animation"]

license = [
    "SPDX:WTFNMFPL",
]

[permissions]
network = "Communicate with the VirtuCamera mobile app over local network"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".opencode/",
  ".vscode/",
  ".git",
  "*.zip",
  ".gitignore",
  "*.bat",
  "*.md"
]
